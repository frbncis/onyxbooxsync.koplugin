name: Build & Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE }}" | base64 -d > release.keystore

      - name: Build APK
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Verify APK exists
        run: ls android/app/build/outputs/apk/release/

      - name: Prepare artifacts
        run: |
          mkdir release
          cp android/app/build/outputs/apk/release/app-release.apk release/onyx-sync.apk
          cp main.lua release/
          cp _meta.lua release/
          mkdir onyxbooxsync.koplugin
          cp main.lua onyxbooxsync.koplugin/
          cp _meta.lua onyxbooxsync.koplugin/
          zip -r release/onyxbooxsync.koplugin.zip onyxbooxsync.koplugin/

      - name: Clean up keystore
        if: always()
        run: rm -f release.keystore

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*